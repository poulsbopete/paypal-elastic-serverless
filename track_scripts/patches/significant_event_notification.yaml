# PayPal track override — vendored from elastic-launch-demo with step order changed:
# queue_remediation runs immediately after count_errors so the remediation poller
# can auto-resolve chaos channels without waiting for run_rca (AI) to finish.
# Upstream reference: elastic_config/workflows/significant_event_notification.yaml

version: "1"
name: __SCENARIO_NAME__ Significant Event Notification
description: >
  Triggered by alert rules. Queues remediation first for fast auto-resolve, then
  runs AI root cause analysis and creates a case.

triggers:
  - type: alert

inputs:
  - name: channel
    type: number
    description: "Fault channel number (1-20) passed by the alert rule action"
  - name: error_type
    type: string
    description: "Error type tag from the alert rule"

steps:
  - name: count_errors
    type: elasticsearch.esql.query
    with:
      query: >
        FROM logs.otel,logs.otel.*
        | WHERE @timestamp > NOW() - 15 MINUTES AND severity_text == "ERROR"
        | STATS total_errors = COUNT(*)
      format: json

  - name: queue_remediation
    type: elasticsearch.index
    with:
      index: "__NS__-remediation-queue"
      document:
        channel: "{{ inputs.channel }}"
        error_type: "{{ event.rule.tags[1] }}"
        dry_run: "false"
        status: "pending"
        triggered_by: "significant_event_notification"
      refresh: wait_for

  - name: run_rca
    type: ai.agent
    agent-id: __AGENT_ID__
    create-conversation: true
    with:
      message: >
        Significant event detected: {{ event.rule.name }}.
        Error type: {{ event.rule.tags[1] }}.
        Total errors in last 15 minutes: {{ steps.count_errors.output.values[0][0] }}.
        Remediation was queued automatically for this demo fault (auto-resolve).
        Perform root cause analysis: confirm whether errors are subsiding,
        identify affected services, trace fault propagation, and provide
        your structured RCA report. Do NOT queue additional remediation actions.

  - name: create_case
    type: kibana.request
    with:
      method: POST
      path: /api/cases
      headers:
        Content-Type: application/json
        kbn-xsrf: "true"
      body:
        title: "__SCENARIO_NAME__ RCA: {{ event.rule.name }}"
        description: "{{ steps.run_rca.output.message }}"
        tags:
          - "__NS__"
          - "{{ event.rule.tags[1] }}"
        severity: "high"
        owner: "observability"
        settings:
          syncAlerts: false
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null

  - name: audit_log
    type: elasticsearch.index
    with:
      index: "__NS__-significant-events-audit"
      document:
        rule_name: "{{ event.rule.name }}"
        error_type: "{{ event.rule.tags[1] }}"
        channel: "{{ inputs.channel }}"
        rca_case_created: true
        mission_id: "__SCENARIO_NAME__"
      refresh: wait_for
