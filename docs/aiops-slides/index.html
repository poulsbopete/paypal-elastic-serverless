<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayPal AIOps: Scaling Intelligence with Elastic AI</title>
  <meta name="description" content="GitHub Pages slide deck from The PayPal AIOps Blueprint — business case, MTTD/MTTR, Elastic AI core, hyperscale ingest, and storage strategy.">
  <style>
    :root {
      --paypal-navy: #003087;
      --paypal-blue: #0070ba;
      --bg: #050a14;
      --text: #e6edf3;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    .chrome {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: linear-gradient(90deg, var(--paypal-navy), var(--paypal-blue));
      border-bottom: 1px solid rgba(255,255,255,0.12);
      font-size: 13px;
    }
    .chrome h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .chrome .sub { color: #a8d4f5; font-size: 11px; margin-top: 2px; }
    .chrome .hint { color: #a8d4f5; font-size: 11px; text-align: right; }
    .stage {
      position: fixed;
      top: 52px;
      left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px 48px;
    }
    .slide-frame {
      max-width: 100%;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .slide-frame img {
      max-width: 100%;
      max-height: calc(100vh - 120px);
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    }
    .caption {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 720px;
      line-height: 1.4;
    }
    .progress {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 10px 16px 14px;
      background: linear-gradient(180deg, transparent, rgba(5,10,20,0.95));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .dot[aria-current="true"] {
      background: var(--paypal-blue);
      transform: scale(1.15);
    }
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 44px; height: 72px;
      border: none;
      border-radius: 0 8px 8px 0;
      background: rgba(0,48,135,0.35);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .nav-btn:hover { background: rgba(0,112,186,0.5); }
    .nav-btn.prev { left: 0; border-radius: 0 8px 8px 0; }
    .nav-btn.next { right: 0; border-radius: 8px 0 0 8px; }
    @media (max-width: 640px) {
      .nav-btn { width: 36px; height: 56px; font-size: 18px; }
    }
  </style>
</head>
<body>
  <header class="chrome">
    <div>
      <h1>PayPal AIOps: Scaling Intelligence with Elastic AI</h1>
      <div class="sub">The PayPal AIOps Blueprint — GitHub Pages deck</div>
    </div>
    <div class="hint">← → or Space · Home / End · tap sides</div>
  </header>

  <div class="stage" id="stage" role="region" aria-label="Slide deck">
    <div class="slide-frame">
      <img id="slideImg" src="img/slide-01.png" alt="">
      <p class="caption" id="caption"></p>
    </div>
  </div>

  <button type="button" class="nav-btn prev" id="prev" aria-label="Previous slide">‹</button>
  <button type="button" class="nav-btn next" id="next" aria-label="Next slide">›</button>

  <nav class="progress" id="dots" aria-label="Slide thumbnails"></nav>

  <script>
    (function () {
      const TOTAL = 14;
      /** Optional short labels — edit to match your narrative (PPTX slides are image-only). */
      const LABELS = [
        "Title — PayPal AIOps: Scaling Intelligence with Elastic AI",
        "Business case — revenue risk and platform stability",
        "Performance — MTTD / MTTR / manual triage: current vs Elastic AI",
        "Outcomes — faster detection, ROI, developer productivity",
        "Technical strategy — Elastic AI core overview",
        "Unified detect → triage → remediate workflow",
        "Hyperscale — ingest capacity and node architecture",
        "Storage — GCS and searchable bulk data",
        "Blueprint continuation (slide 9)",
        "Blueprint continuation (slide 10)",
        "Blueprint continuation (slide 11)",
        "Blueprint continuation (slide 12)",
        "Blueprint continuation (slide 13)",
        "Blueprint continuation (slide 14)"
      ];

      let index = 0;
      const img = document.getElementById("slideImg");
      const caption = document.getElementById("caption");
      const dots = document.getElementById("dots");

      function pad(n) { return String(n + 1).padStart(2, "0"); }

      function render() {
        img.src = "img/slide-" + pad(index) + ".png";
        img.alt = "Slide " + (index + 1) + " of " + TOTAL + ": " + (LABELS[index] || "");
        caption.textContent = (index + 1) + " / " + TOTAL + " — " + (LABELS[index] || "Slide " + (index + 1));
        dots.querySelectorAll("button").forEach((b, i) => {
          b.setAttribute("aria-current", i === index ? "true" : "false");
        });
        history.replaceState(null, "", "#" + (index + 1));
      }

      function go(i) {
        index = Math.max(0, Math.min(TOTAL - 1, i));
        render();
      }

      for (let i = 0; i < TOTAL; i++) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "dot";
        b.setAttribute("aria-label", "Go to slide " + (i + 1));
        b.addEventListener("click", () => go(i));
        dots.appendChild(b);
      }

      document.getElementById("prev").addEventListener("click", () => go(index - 1));
      document.getElementById("next").addEventListener("click", () => go(index + 1));

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
          e.preventDefault();
          go(index + 1);
        } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
          e.preventDefault();
          go(index - 1);
        } else if (e.key === "Home") {
          e.preventDefault();
          go(0);
        } else if (e.key === "End") {
          e.preventDefault();
          go(TOTAL - 1);
        }
      });

      document.getElementById("stage").addEventListener("click", (e) => {
        if (e.target.closest("img")) {
          const r = e.currentTarget.getBoundingClientRect();
          if (e.clientX - r.left < r.width / 2) go(index - 1);
          else go(index + 1);
        }
      });

      const hash = parseInt(location.hash.slice(1), 10);
      if (hash >= 1 && hash <= TOTAL) index = hash - 1;
      render();
    })();
  </script>
</body>
</html>
